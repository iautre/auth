syntax = "proto3";

package auth;

option go_package = "github.com/iautre/auth/pkg/proto;proto";

import "google/protobuf/empty.proto";

service AuthService {
  rpc OAuth2Token(OAuth2TokenRequest) returns (OAuth2TokenResponse);
  rpc OIDCUserInfo(OIDCUserInfoRequest) returns (OIDCUserInfoResponse);
  rpc OIDCJwks(google.protobuf.Empty) returns (OIDCJwksResponse);
  rpc OIDCDiscovery(google.protobuf.Empty) returns (OIDCDiscoveryResponse);
  // CheckToken 验证 auth 服务签发的 native token（存储于共享 Redis 的 UUID token）。
  // 其他服务（console 等）通过此接口完成 token 鉴权，无需直连 Redis。
  rpc CheckToken(CheckTokenRequest) returns (CheckTokenResponse);
  // GetUserInfo 根据 user_id 返回昵称、分组等，供远程模式下的调用方填入 context。
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
  // Login 验证账号密码/OTP，签发 gowk token 并存入 auth Redis。
  // 调用方凭此 token 再通过 CheckToken 完成后续鉴权，无需直连 Redis。
  rpc Login(LoginRequest) returns (LoginResponse);
  // GetFullUserInfo 返回完整用户信息（用于 /user/info 接口）。
  rpc GetFullUserInfo(GetUserInfoRequest) returns (FullUserInfoResponse);
}

message OAuth2TokenRequest {
  string grant_type = 1;
  string code = 2;
  string redirect_uri = 3;
  string client_id = 4;
  string client_secret = 5;
  string refresh_token = 6;
  string scope = 7;
  string code_verifier = 8; // PKCE support
}

message OAuth2TokenResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_in = 3;
  string refresh_token = 4;
  string scope = 5;
  string id_token = 6;
}

message OIDCUserInfoRequest {
  string access_token = 1;
}

message OIDCUserInfoResponse {
  string sub = 1;
  string name = 2;
  string email = 3;
  bool email_verified = 4;
  string given_name = 5;
  string family_name = 6;
  string middle_name = 7;
  string nickname = 8;
  string preferred_username = 9;
  string picture = 10;
  string phone_number = 11;
  bool phone_number_verified = 12;
  string locale = 13;
  int64 updated_at = 14;
}

message OIDCJwksResponse {
  repeated OIDCJwk keys = 1;
}

message OIDCJwk {
  string kty = 1;
  string use = 2;
  string kid = 3;
  string n = 4;
  string e = 5;
  string alg = 6;
}

message CheckTokenRequest {
  string token = 1;
}

message CheckTokenResponse {
  int64 user_id = 1;
  string device = 2;
}

message GetUserInfoRequest {
  int64 user_id = 1;
}

message GetUserInfoResponse {
  int64 user_id = 1;
  string nickname = 2;
  string group = 3;
}

message LoginRequest {
  string account = 1;
  string code = 2;
}

message LoginResponse {
  string token = 1;
  int64 user_id = 2;
  string nickname = 3;
  string avatar = 4;
}

message FullUserInfoResponse {
  int64 id = 1;
  string phone = 2;
  string email = 3;
  string nickname = 4;
  string group = 5;
  string avatar = 6;
  bool is_verified = 7;
  bool enabled = 8;
  string last_login_at = 9;
  string created = 10;
}

message OIDCDiscoveryResponse {
  string issuer = 1;
  string authorization_endpoint = 2;
  string token_endpoint = 3;
  string userinfo_endpoint = 4;
  string jwks_uri = 5;
  repeated string scopes_supported = 6;
  repeated string response_types_supported = 7;
  repeated string grant_types_supported = 8;
  repeated string subject_types_supported = 9;
  repeated string id_token_signing_alg_values_supported = 10;
}
